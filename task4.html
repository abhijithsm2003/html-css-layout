<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>

        *{
            margin: 0;
        }
        body{
            background-color: #c2dbe6;
        }
        .header{
            width: 95%;
            height: 90px;
            background-color: #12b8b0;
            margin: 30px;
            text-align: center;
            font-size: 50px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .main{
            width: 95%;
            height: 500px;
            margin: 30px;;
            display: flex;
            gap: 40px;
        }
        .aside{
            width: 30%;
            background-color: #6bd36a;
            text-align: center;
            font-size: 50px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .article{
            width: 70%;
            background-color: #f3ad49;
            text-align: center;
            color: white;
        }
        .article h1{
            margin-top: 180px;
            font-size: 50px;
        }
        .images{
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }
        .image-box{
            width: 180px;
            height: 180px;
            background-color: #f0cd4d;
            text-align: center;
            font-size: 40px;
            color: white;
            display: flex;
            justify-content: center;    
            align-items: center;
        }
        .footer{
            width: 95%;
            height: 90px;
            background-color: #12b8b0;
            margin: 30px;
            text-align: center;
            font-size: 50px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        
        }
    </style>
</head>
<body>
    <div class="header">
        Header
    </div>
    <div class="main">
        <div class="aside">
            Aside
        </div>
        <div class="article">
            <h1>Article</h1>
            <div class="images">
                <div class="image-box">Image</div>
                <div class="image-box">Image</div>
                <div class="image-box">Image</div>
            </div>
        </div>
    </div>
    <div class="footer">
        Footer
    </div>
</body>
</html>
